<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Scanner</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="app-header">
  <div class="header-left">
    <div class="app-logo">R</div>
    <span class="app-title">Receipt Scanner</span>
    <button class="btn btn-primary" id="btn-scan">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M4 4h4V2H2v6h2V4zm8-2v2h4v4h2V2h-6zm-8 12H2v6h6v-2H4v-4zm12 4h-4v2h6v-6h-2v4z"/></svg>
      Scan Now
    </button>
    <span class="watch-indicator" id="watch-status">
      <span class="dot dot-gray"></span>
      <span id="watch-label">Connecting…</span>
    </span>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" id="btn-print" onclick="window.print()">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v5a2 2 0 002 2h1v2a1 1 0 001 1h8a1 1 0 001-1v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4zm-1 9H5v-2h1v2zm9-2v2h-1v-2h1zm-7 4V13h4v2H9z" clip-rule="evenodd"/></svg>
      Print
    </button>
    <div class="export-menu-wrap">
      <button class="btn btn-ghost" id="btn-export-toggle">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Export
        <svg viewBox="0 0 20 20" fill="currentColor" width="12" height="12" style="margin-left:2px"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
      <div class="export-menu" id="export-menu" style="display:none">
        <a href="#" class="export-item" data-fmt="csv">CSV</a>
        <a href="#" class="export-item" data-fmt="xlsx">Excel (.xlsx)</a>
        <a href="#" class="export-item" data-fmt="pdf">PDF</a>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-change-folder">&#8594; Scan a different folder</button>
  </div>
</header>

<!-- ── Stats ────────────────────────────────────────────────────────────────── -->
<section class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">TOTAL RECEIPTS</div>
    <div class="stat-value" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">TOTAL SPEND</div>
    <div class="stat-value" id="stat-spend">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">VENDORS</div>
    <div class="stat-value" id="stat-vendors">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">CARDS ON FILE</div>
    <div class="stat-value" id="stat-cards">—</div>
  </div>
</section>

<!-- ── Filters ───────────────────────────────────────────────────────────────── -->
<section class="filters-bar">
  <div class="filter-row">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
      <input type="text" id="filter-search" class="filter-input search-input" placeholder="Search vendor or items…" />
    </div>

    <select id="filter-card" class="filter-select">
      <option value="">All Cards</option>
    </select>

    <select id="filter-category" class="filter-select">
      <option value="">All Categories</option>
    </select>

    <div class="date-range">
      <input type="date" id="filter-date-from" class="filter-input date-input" />
      <span class="date-sep">—</span>
      <input type="date" id="filter-date-to" class="filter-input date-input" />
    </div>

    <div class="sort-toggle" id="sort-toggle">
      <button class="sort-btn active" data-sort="date">Date</button>
      <button class="sort-btn" data-sort="vendor_name">Vendor</button>
      <button class="sort-btn" data-sort="total_amount">Amount</button>
      <button class="sort-btn" data-sort="card_last4">Card</button>
    </div>

    <button class="btn btn-ghost btn-sm" id="btn-clear-filters">Clear Filters</button>
  </div>
</section>

<!-- ── Main table ────────────────────────────────────────────────────────────── -->
<main class="main-content">
  <div class="table-wrap">
    <table class="receipts-table">
      <thead>
        <tr>
          <th class="col-thumb"></th>
          <th class="col-vendor">VENDOR</th>
          <th class="col-date">DATE</th>
          <th class="col-amount">AMOUNT</th>
          <th class="col-card">CARD</th>
          <th class="col-category">CATEGORY</th>
          <th class="col-items">ITEMS</th>
          <th class="col-actions">ACTIONS</th>
        </tr>
      </thead>
      <tbody id="receipts-tbody">
        <tr class="loading-row">
          <td colspan="8"><div class="spinner"></div></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- ── Change Folder Modal ────────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="folder-modal" style="display:none">
  <div class="modal">
    <h3 class="modal-title">Change Watch Folder</h3>
    <p class="modal-desc">Enter the full path to the folder you want to monitor for new receipt photos.</p>
    <input type="text" id="folder-input" class="modal-input" placeholder="e.g. G:\My Drive\Mobile Photo Sync" />
    <div id="folder-error" class="modal-error" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-folder-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-folder-save">Save &amp; Restart Watcher</button>
    </div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────────── -->
<div id="toast" class="toast" style="display:none"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
